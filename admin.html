<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIT COMMAND CENTER - MALRA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .sidebar { background: #1e293b; border-right: 1px solid #334155; }
        .card-adu { background: #1e293b; border: 1px solid #334155; transition: 0.3s; }
        .card-adu:hover { border-color: #3b82f6; transform: translateY(-3px); }
        @media print { .no-print { display: none; } .print-area { display: block !important; color: black; } body { background: white; color: black; } }
        .print-area { display: none; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="sidebar w-64 p-6 hidden lg:flex flex-col no-print">
        <div class="mb-10 flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fas fa-shield-alt"></i></div>
            <h1 class="text-xl font-black italic tracking-tighter text-white">SiAPP <span class="text-blue-500">MAS</span></h1>
        </div>
        <nav class="space-y-4">
            <div class="p-4 bg-blue-600 rounded-xl text-white font-bold"><i class="fas fa-home mr-2"></i> Dashboard</div>
            <button onclick="downloadExcel()" class="w-full text-left p-4 hover:bg-emerald-600/20 text-emerald-500 rounded-xl font-bold border border-emerald-500/20">
                <i class="fas fa-file-excel mr-2"></i> Ekspor Excel
            </button>
        </nav>
        <div class="mt-auto bg-slate-900/50 p-4 rounded-xl border border-slate-700 italic">
            <p class="text-[10px] text-slate-500 font-black">LOGIN AUDITOR:</p>
            <p class="text-sm font-bold text-white uppercase">FIRDAUS, S.T</p>
        </div>
    </aside>

    <!-- CONTENT -->
    <main class="flex-1 p-6 md:p-12 no-print overflow-y-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h2 class="text-3xl font-black italic text-white tracking-tight uppercase underline decoration-blue-600">Command Center Audit</h2>
                <p id="clock" class="text-slate-500 text-sm font-bold"></p>
            </div>
            <div class="flex gap-4">
                <button onclick="window.location.reload()" class="p-4 bg-slate-800 rounded-xl border border-slate-700 hover:text-blue-500 transition-all"><i class="fas fa-sync"></i></button>
                <button onclick="downloadExcel()" class="px-6 py-4 bg-emerald-600 text-white font-black text-xs uppercase tracking-widest rounded-xl shadow-lg shadow-emerald-500/20">Ekspor Ke Excel <i class="fas fa-download ml-2"></i></button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="bg-blue-600/10 p-8 rounded-3xl border-l-8 border-blue-600 card-adu">
                <p class="text-[10px] font-black uppercase text-blue-500 tracking-widest mb-1 italic">Total Masuk</p>
                <p id="totalCount" class="text-6xl font-black italic tracking-tighter">0</p>
            </div>
            <div class="bg-red-600/10 p-8 rounded-3xl border-l-8 border-red-600 card-adu">
                <p class="text-[10px] font-black uppercase text-red-500 tracking-widest mb-1 italic">Dugaan Korupsi</p>
                <p id="urgentCount" class="text-6xl font-black italic tracking-tighter text-red-500">0</p>
            </div>
        </div>

        <div id="loader" class="text-center py-20 text-slate-500 animate-pulse italic font-black uppercase tracking-widest">
            <i class="fas fa-satellite-dish fa-spin text-4xl mb-4 text-blue-500"></i><br>Sinkronisasi Server Malra...
        </div>

        <div id="dataList" class="space-y-4"></div>
    </main>

    <!-- AREA PRINT -->
    <div id="printContainer" class="print-area p-10 hidden text-black bg-white italic font-black uppercase leading-loose text-justify text-xs">
        <center class="border-b-4 border-double border-black mb-10 pb-5 uppercase">
            <h1 class="text-xl font-bold uppercase font-sans">Pemerintah Kabupaten Maluku Tenggara</h1>
            <h1 class="text-2xl font-bold underline">INSPEKTORAT DAERAH</h1>
            <p>Saluran Aduan SiAPP MAS @ Firdaus Auditor</p>
        </center>
        <div id="printBody"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyA3hAV-t9EYHBXpiUW9crY1q-tgM48wdRc",
            authDomain: "siapp-mas-malra-aa6c4.firebaseapp.com",
            projectId: "siapp-mas-malra-aa6c4",
            storageBucket: "siapp-mas-malra-aa6c4.firebasestorage.app",
            messagingSenderId: "18948056709",
            appId: "1:18948056709:web:6c5877826c206ac2e6ebec"
        };

        const app = initializeApp(config);
        const db = getFirestore(app);
        let list = [];

        async function fetchAll(){
            const div = document.getElementById('dataList');
            const load = document.getElementById('loader');
            try {
                const q = query(collection(db, "pengaduan"), orderBy("timestamp", "desc"));
                const snap = await getDocs(q);
                load.style.display = 'none';
                div.innerHTML = ""; list = [];
                let t = 0, k = 0;

                snap.forEach(d => {
                    const i = d.data();
                    list.push(i);
                    t++; if(i.kategori === 'Korupsi') k++;
                    const date = i.timestamp?.toDate ? i.timestamp.toDate().toLocaleString('id-ID') : 'Belum Ada Waktu';

                    div.innerHTML += `
                        <div class="card-adu p-6 rounded-3xl flex items-center gap-6 animate-fade-in uppercase">
                            <img src="${i.validasi_wajah || i.wajah}" class="w-14 h-14 rounded-xl border border-slate-700 shadow-xl object-cover">
                            <div class="flex-1 italic tracking-tight">
                                <span class="text-[9px] font-black text-blue-500">${i.ticket_id} | ${date}</span>
                                <h3 class="text-lg font-black underline italic decoration-blue-500 decoration-2">${i.perihal || i.judul}</h3>
                                <p class="text-[10px] text-slate-500 font-bold uppercase underline">${i.kecamatan} | OHOI: ${i.desa}</p>
                            </div>
                            <button onclick='detailPdf(${JSON.stringify(i).replace(/'/g, "&apos;")})' class="bg-blue-600 px-5 py-3 rounded-xl text-[10px] font-black shadow-lg shadow-blue-600/20 active:scale-95 italic">PROSES BERKAS</button>
                        </div>
                    `;
                });
                document.getElementById('totalCount').innerText = t;
                document.getElementById('urgentCount').innerText = k;
                if(t === 0) { load.innerHTML = "DATA KOSONG. COBALAH ISI ADUAN DARI HP."; load.style.display = 'block'; }
            } catch (err) { load.innerHTML = "KONEKSI GAGAL: " + err.message; }
        }

        window.detailPdf = (data) => {
            document.getElementById('printBody').innerHTML = `
                <table width="100%" cellpadding="10" border="1">
                    <tr><td>NO. TICKET</td><td>${data.ticket_id}</td></tr>
                    <tr><td>WAKTU ADUAN</td><td>${data.timestamp?.toDate ? data.timestamp.toDate().toLocaleString() : 'N/A'}</td></tr>
                    <tr><td>JENIS LAPORAN</td><td>${data.kategori}</td></tr>
                    <tr><td>PELAPOR (WA)</td><td>${data.no_hp}</td></tr>
                    <tr><td>LOKASI</td><td>KECAMATAN: ${data.kecamatan} | DESA: ${data.desa}</td></tr>
                    <tr><td>HAL</td><td><b>${data.perihal || data.judul}</b></td></tr>
                </table>
                <br><b>URAIAN ADUAN:</b><br>
                <p style="border:1px solid black; padding: 20px;">${data.laporan_detail || data.deskripsi}</p>
                <br><br><b>PENGESAHAN OLEH AUDITOR, FIRDAUS S.T</b>
            `;
            window.print();
        }

        window.downloadExcel = () => {
            if(list.length === 0) return alert("Data Kosong!");
            const ws = XLSX.utils.json_to_sheet(list);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekap");
            XLSX.writeFile(wb, "Rekap_SiAPP_Mas.xlsx");
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('id-ID'); }, 1000);
        fetchAll();
    </script>
</body>
</html>
