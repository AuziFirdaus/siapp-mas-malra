<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | SiAPP Mas Malra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .sidebar { background: #0f172a; transition: all 0.3s; }
        .report-card { transition: all 0.2s; border-left: 5px solid transparent; }
        .report-card:hover { transform: translateX(5px); }
        .badge-Korupsi { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .badge-Pungli { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .status-MASUK { color: #2563eb; font-weight: 800; }
    </style>
</head>
<body class="flex">

    <!-- SIDEBAR -->
    <aside class="sidebar w-64 min-h-screen text-slate-300 hidden md:block flex-shrink-0 p-6">
        <div class="flex items-center gap-3 text-white mb-10">
            <i class="fas fa-shield-halved text-2xl text-blue-500"></i>
            <span class="font-extrabold tracking-tighter text-lg uppercase">SiAPP Admin</span>
        </div>
        <nav class="space-y-4 font-semibold text-sm">
            <a href="#" class="flex items-center gap-3 text-white bg-blue-600/20 p-3 rounded-xl border border-blue-600/30">
                <i class="fas fa-chart-line w-5 text-blue-400"></i> Dashboard Utama
            </a>
            <a href="#" class="flex items-center gap-3 hover:text-white p-3 transition-all group">
                <i class="fas fa-folder-open w-5 group-hover:text-blue-400 transition-all"></i> Data Pengaduan
            </a>
            <a href="#" class="flex items-center gap-3 hover:text-white p-3 transition-all group">
                <i class="fas fa-users w-5 group-hover:text-blue-400 transition-all"></i> Pengguna Akun
            </a>
        </nav>
        <div class="mt-40 border-t border-slate-700 pt-10">
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                <p class="text-xs font-bold text-slate-500">USER LOGGED IN</p>
                <p class="text-sm text-blue-400 font-bold mt-1">FIRDAUS, AUDITOR</p>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-6 md:p-12 overflow-y-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Pusat Audit Aduan</h1>
                <p class="text-slate-500 font-medium">Inspektorat Kabupaten Maluku Tenggara</p>
            </div>
            <button onclick="window.location.reload()" class="bg-white border border-slate-200 px-6 py-3 rounded-2xl font-bold shadow-sm hover:bg-slate-50 active:scale-95 transition-all text-sm">
                <i class="fas fa-sync-alt mr-2 text-blue-600"></i> PERBARUI DATA
            </button>
        </header>

        <!-- Stats Bar -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm font-bold">TOTAL LAPORAN</p>
                <p id="totalCount" class="text-4xl font-extrabold mt-1 text-slate-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-red-500 text-sm font-bold italic underline">🚨 PERINGATAN KORUPSI</p>
                <p id="corruptionCount" class="text-4xl font-extrabold mt-1 text-red-600">0</p>
            </div>
        </div>

        <!-- Tabel / Daftar Laporan -->
        <div class="space-y-4" id="containerAduan">
            <!-- Loading Indicator -->
            <div class="text-center py-20">
                <i class="fas fa-spinner fa-spin text-3xl text-blue-500 mb-4"></i>
                <p class="text-slate-500 font-medium tracking-widest">MENGHUBUNGKAN KE SERVER DATA...</p>
            </div>
        </div>
    </main>

    <!-- Firebase SDK & Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // Konfigurasi Sama dengan yang Bapak berikan tadi
        const firebaseConfig = {
          apiKey: "AIzaSyA3hAV-t9EYHBXpiUW9crY1q-tgM48wdRc",
          authDomain: "siapp-mas-malra-aa6c4.firebaseapp.com",
          projectId: "siapp-mas-malra-aa6c4",
          storageBucket: "siapp-mas-malra-aa6c4.firebasestorage.app",
          messagingSenderId: "18948056709",
          appId: "1:18948056709:web:6c5877826c206ac2e6ebec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Ambil data
        async function renderData() {
            const q = query(collection(db, "pengaduan"), orderBy("created_at", "desc"));
            const querySnapshot = await getDocs(q);
            const container = document.getElementById('containerAduan');
            const totalCountEl = document.getElementById('totalCount');
            const corruptionCountEl = document.getElementById('corruptionCount');

            container.innerHTML = "";
            let counter = 0;
            let korupsiCounter = 0;

            querySnapshot.forEach((doc) => {
                const item = doc.data();
                counter++;
                if(item.kategori === 'Korupsi') korupsiCounter++;

                // Konversi tanggal
                const dateObj = item.created_at?.toDate ? item.created_at.toDate() : new Array();
                const displayDate = dateObj.toLocaleString ? dateObj.toLocaleString('id-ID') : 'Belum Tersedia';

                container.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center report-card gap-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="text-[10px] font-extrabold uppercase bg-blue-100 text-blue-700 px-3 py-1 rounded-full">${item.ticket_id}</span>
                                <span class="text-[10px] font-extrabold uppercase px-3 py-1 rounded-full badge-${item.kategori}">${item.kategori}</span>
                            </div>
                            <h3 class="text-xl font-extrabold text-slate-800 mb-1 leading-tight">${item.judul}</h3>
                            <p class="text-sm text-slate-500 font-medium mb-3 max-w-2xl">${item.deskripsi.substring(0, 150)}...</p>
                            <div class="flex gap-4 items-center">
                                <p class="text-[11px] text-slate-400"><i class="far fa-clock mr-1"></i> ${displayDate}</p>
                                <p class="text-[11px] text-blue-600 font-bold bg-blue-50 px-2 py-0.5 rounded italic tracking-widest uppercase">${item.status}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto">
                            <button class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-2xl font-bold text-sm shadow-md shadow-blue-200 transition-all">VERIFIKASI</button>
                            <button class="flex-1 md:flex-none bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-3 rounded-2xl font-bold text-sm transition-all">ARSIPKAN</button>
                        </div>
                    </div>
                `;
            });
            totalCountEl.innerText = counter;
            corruptionCountEl.innerText = korupsiCounter;
        }

        renderData();
    </script>
</body>
</html>
