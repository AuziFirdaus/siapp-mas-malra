<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiAPP Mas | Inspektorat Maluku Tenggara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .btn-gradient { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigasi Elegan -->
    <nav class="sticky top-0 z-50 glass border-b border-slate-200">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2.5 rounded-xl shadow-lg shadow-blue-200 text-white leading-none">
                    <i class="fas fa-shield-heart text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight text-slate-800 leading-none">SiAPP <span class="text-blue-600">Mas</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mt-1 italic">Maluku Tenggara Integrity</p>
                </div>
            </div>
            <div class="hidden md:block">
                 <span class="text-[10px] bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full font-extrabold border border-blue-100">AUDITOR EXPERT FIRST</span>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-12">
        <!-- Header -->
        <div class="text-center mb-10">
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Suarakan Aduan Anda</h2>
            <p class="text-slate-500 mt-2 font-medium italic">"Membangun Maluku Tenggara yang Bersih & Berwibawa"</p>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-[2rem] shadow-2xl shadow-slate-200/60 p-8 border border-slate-100 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
                <i class="fas fa-gavel text-9xl"></i>
            </div>
            
            <form id="complaintForm" class="space-y-6 relative">
                <!-- Kategori -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 px-1">Tipe Laporan</label>
                    <select id="kategori" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-4 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all font-semibold text-slate-700">
                        <option value="Korupsi">🚫 Dugaan Tindak Pidana Korupsi</option>
                        <option value="Pungli">💸 Pungutan Liar (Pungli)</option>
                        <option value="Layanan Publik">🏢 Buruknya Layanan Publik</option>
                        <option value="Infrastruktur">🏗️ Masalah Infrastruktur Daerah</option>
                        <option value="Lainnya">📝 Laporan Lain-lain</option>
                    </select>
                </div>

                <!-- Judul -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 px-1">Perihal Utama</label>
                    <input type="text" id="judul" placeholder="Apa inti masalahnya?" required
                    class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-4 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
                </div>

                <!-- Deskripsi -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 px-1">Uraian Kejadian</label>
                    <textarea id="deskripsi" rows="5" placeholder="Sebutkan lokasi, oknum terlibat, dan kronologis singkat..." required
                    class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-4 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all"></textarea>
                </div>

                <!-- Tombol Submit -->
                <button type="submit" id="btnSubmit" class="w-full btn-gradient text-white font-extrabold py-5 rounded-2xl shadow-lg transform active:scale-[0.98]">
                    KIRIM PENGADUAN KE INSPEKTORAT
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="mt-10 flex flex-col items-center justify-center gap-4 text-center">
            <div class="flex gap-4">
                <div class="flex items-center gap-1 text-[10px] font-bold text-green-600 bg-green-50 px-2 py-1 rounded border border-green-100 italic">
                    <i class="fas fa-lock"></i> DATA TERENKRIPSI
                </div>
                <div class="flex items-center gap-1 text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded border border-blue-100 italic">
                    <i class="fas fa-user-secret"></i> ANONIMITAS TERJAMIN
                </div>
            </div>
            <p class="text-[11px] text-slate-400 leading-relaxed font-medium">
                Sesuai visi Auditor Ahli Pertama, FIRDAUS. <br>
                Sistem Informasi Pengaduan Masyarakat (SiAPP Mas) - © 2024
            </p>
        </div>
    </main>

    <!-- Firebase System -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // Konfigurasi Baru Bapak Firdaus
        const firebaseConfig = {
          apiKey: "AIzaSyA3hAV-t9EYHBXpiUW9crY1q-tgM48wdRc",
          authDomain: "siapp-mas-malra-aa6c4.firebaseapp.com",
          projectId: "siapp-mas-malra-aa6c4",
          storageBucket: "siapp-mas-malra-aa6c4.firebasestorage.app",
          messagingSenderId: "18948056709",
          appId: "1:18948056709:web:6c5877826c206ac2e6ebec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Aksi Submit Laporan
        document.getElementById('complaintForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const originalText = btn.innerHTML;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin mr-2'></i> MENGIRIM DATA...";
            btn.disabled = true;

            const kategori = document.getElementById('kategori').value;
            const judul = document.getElementById('judul').value;
            const deskripsi = document.getElementById('deskripsi').value;

            try {
                // Menanam data ke Firestore koleksi "pengaduan"
                const docRef = await addDoc(collection(db, "pengaduan"), {
                    ticket_id: "SPM-" + Math.floor(1000 + Math.random() * 9000),
                    kategori: kategori,
                    judul: judul,
                    deskripsi: deskripsi,
                    status: "MASUK",
                    prioritas: kategori === 'Korupsi' ? 'SANGAT TINGGI' : 'NORMAL',
                    created_at: serverTimestamp()
                });

                alert("ALHAMDULILLAH! Laporan Bapak/Ibu sudah kami terima di sistem Inspektorat Malra. Kami akan segera melakukan validasi.");
                document.getElementById('complaintForm').reset();
            } catch (error) {
                console.error("Firebase Error: ", error);
                alert("Sistem sibuk! Mohon pastikan koneksi internet lancar dan Rules Firestore di set ke 'true'.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
