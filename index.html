<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiAPP Mas | Strict Verification Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .form-focus:focus { border-color: #3b82f6; ring: 4px; ring-color: rgba(37, 99, 235, 0.2); outline: none; }
        #video-preview { transform: scaleX(-1); border-radius: 20px; width: 100%; max-width: 280px; margin: 0 auto; display: none; background: #000; border: 4px solid #1e293b; }
        #face-canvas { display: none; }
        .quality-badge { font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 99px; text-transform: uppercase; letter-spacing: 1px; }
        .status-fail { background: #ef4444; color: white; }
        .status-pass { background: #10b981; color: white; }
        .alert-strict { background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%); border-left: 5px solid #3b82f6; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 py-4 shadow-2xl px-6 uppercase italic font-black">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl text-white shadow-xl animate-pulse"><i class="fas fa-fingerprint"></i></div>
                <h1 class="text-xl tracking-tighter uppercase italic underline decoration-blue-600">SiAPP <span class="text-blue-500">MAS</span></h1>
            </div>
            <span class="text-[9px] text-slate-500 italic">SYSTEM V.6.1 PREMIER</span>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-8">
        <!-- ALERT KERAHASIAAN DAN ATURAN KETAT -->
        <div class="alert-strict p-6 rounded-3xl mb-8 shadow-xl border border-slate-800">
            <div class="flex items-center gap-4">
                <i class="fas fa-user-shield text-blue-500 text-3xl"></i>
                <div>
                    <h3 class="text-[10px] font-black text-blue-400 uppercase tracking-widest italic font-sans underline decoration-white">KEBIJAKAN KERAHASIAAN PELAPOR</h3>
                    <p class="text-[11px] text-white font-bold italic leading-relaxed uppercase tracking-tight font-sans underline">IDENTITAS DIJAMIN KERAHASIAANNYA OLEH INSTANSI SESUAI PERATURAN PERUNDANG-UNDANGAN.</p>
                </div>
            </div>
        </div>

        <div class="bg-slate-900/50 rounded-[2.5rem] shadow-2xl border border-slate-800 p-8 md:p-10 italic">
            <form id="complaintForm" class="space-y-6 font-black uppercase tracking-tight">
                
                <!-- MONITOR KUALITAS WAJAH (SENSOR AI) -->
                <div class="bg-slate-950 p-6 rounded-3xl border-2 border-dashed border-slate-800 text-center relative overflow-hidden">
                    <span class="inline-block text-[9px] text-blue-500 mb-4 tracking-[0.2em] italic font-black uppercase">Sensor Biometrik Auditor Malra</span>
                    <video id="video-preview" autoplay playsinline class="shadow-2xl mb-4 mx-auto"></video>
                    <canvas id="face-canvas"></canvas>
                    <img id="face-result" class="mx-auto rounded-3xl shadow-2xl mb-4 hidden border-4 border-slate-800" style="max-width: 220px;">
                    
                    <div id="qualityInfo" class="mb-4 flex justify-center gap-2 hidden">
                         <span id="badgeBright" class="quality-badge status-fail italic uppercase">KUALITAS CAHAYA</span>
                         <span id="badgeSharp" class="quality-badge status-pass italic uppercase">SENSOR FOKUS</span>
                    </div>

                    <button type="button" id="start-camera" class="w-full bg-slate-800 p-4 rounded-2xl text-[10px] font-black uppercase hover:bg-slate-700 active:scale-95 transition-all italic underline decoration-blue-500 underline-offset-4 decoration-2">MULAI SCAN WAJAH (CAMERA)</button>
                    <button type="button" id="take-photo" class="w-full bg-blue-600 p-4 rounded-2xl text-[10px] font-black uppercase hidden animate-bounce shadow-2xl italic tracking-widest decoration-white underline underline-offset-4">VERIFIKASI WAJAH ANDA (FIX)</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 italic underline underline-offset-4 font-black">
                    <div>
                        <label class="text-[9px] text-slate-500 px-2 italic font-sans italic tracking-tight font-black uppercase decoration-white leading-loose underline">NO WhatsApp Pelapor</label>
                        <input type="number" id="no_hp" required placeholder="08..." class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 font-bold text-slate-200 form-focus uppercase italic text-xs tracking-widest font-black underline italic">
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-500 px-2 font-black italic italic tracking-tight font-black underline uppercase">Kategori Aduan</label>
                        <select id="kategori" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 font-bold text-slate-200 form-focus uppercase italic text-xs tracking-tighter decoration-blue-500 underline underline-offset-1 decoration-4 italic text-balance font-black">
                            <option value="Korupsi">DUGAAN KORUPSI</option>
                            <option value="Pungli">PUNGUTAN LIAR (PUNGLI)</option>
                            <option value="Layanan Publik">LAYANAN PUBLIK BURUK</option>
                        </select>
                    </div>
                </div>

                <!-- SCAN KTP + VALIDASI TEGAS -->
                <div class="bg-blue-600/5 p-6 rounded-[2.5rem] border border-blue-600/20 text-center italic">
                    <label class="block text-[9px] text-blue-400 mb-4 tracking-[0.2em] font-black uppercase"><i class="fas fa-id-card mr-2 italic decoration-white font-black underline"></i> Upload Identitas KTP (FOTO TERANG)</label>
                    <img id="ktpPreview" class="rounded-xl w-full hidden border-2 border-slate-700 shadow-2xl mb-4 grayscale">
                    <input type="file" id="ktp_file" accept="image/*" required class="w-full text-[10px] text-slate-500 file:mr-4 file:py-2 file:px-6 file:rounded-2xl file:border-0 file:text-[9px] file:font-black file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                    <p id="ktpQuality" class="quality-badge status-fail hidden mt-4 italic font-black uppercase tracking-[0.3em] font-sans">E-KTP TER DETEKSI : BELUM JELAS</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 italic font-sans italic tracking-tighter text-balance text-justify text-wrap text-xs px-1 uppercase italic underline">
                    <div>
                        <select id="kecamatan" required class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 font-bold text-slate-200 form-focus uppercase italic text-[11px] font-black">
                            <option value="">- KECAMATAN -</option>
                            <option value="Kei Kecil">Kei Kecil</option>
                            <option value="Manyeuw">Manyeuw</option>
                            <option value="Kei Kecil Timur">Kei Kecil Timur</option>
                            <option value="Kei Kecil Timur Selatan">Kei Kecil Timur Selatan</option>
                            <option value="Kei Kecil Barat">Kei Kecil Barat</option>
                            <option value="Hoat Sorbay">Hoat Sorbay</option>
                            <option value="Kei Besar">Kei Besar</option>
                            <option value="Kei Besar Selatan">KEI BESAR SELATAN</option>
                            <option value="Kei Besar Selatan Barat">KEI BESAR SELATAN BARAT</option>
                            <option value="Kei Besar Utara Barat">KEI BESAR UTARA BARAT</option>
                            <option value="Kei Besar Utara Timur">KEI BESAR UTARA TIMUR</option>
                        </select>
                    </div>
                    <input type="text" id="desa" required placeholder="OHOI / DESA" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 font-black italic uppercase italic tracking-widest underline underline-offset-4 decoration-blue-600 text-xs">
                </div>

                <input type="text" id="judul" required placeholder="RINGKASAN LAPORAN (JUDUL)" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-5 font-black uppercase italic tracking-tighter decoration-white underline decoration-2 italic text-xs leading-loose underline italic text-balance font-black">
                <textarea id="deskripsi" rows="4" required placeholder="CERITAKAN KRONOLOGI SECARA LENGKAP & TEGAS..." class="w-full bg-slate-950 border border-slate-800 rounded-[2rem] p-6 text-sm font-medium tracking-tight font-black uppercase text-justify italic decoration-blue-700 leading-relaxed"></textarea>

                <div class="bg-slate-950 p-6 rounded-3xl border border-slate-800 font-sans px-1 uppercase tracking-tight decoration-white italic underline font-bold leading-none font-sans py-4 font-black text-slate-500">
                    <label class="block text-[9px] mb-2 px-1 tracking-widest font-black uppercase">Dokumen Pendukung (Foto/PDF - Opsi)</label>
                    <input type="file" id="bukti" accept="image/*, application/pdf" class="w-full text-xs text-slate-600">
                </div>

                <!-- TOMBOL TEGAS (AUTO LOCKED) -->
                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-500 p-7 rounded-[2rem] font-black italic tracking-[0.2em] shadow-2xl shadow-blue-500/10 opacity-50 cursor-not-allowed transition-all uppercase text-[11px]" disabled>
                    SUBMIT LAPORAN : MENUNGGU VERIFIKASI BIOMETRIK & KTP
                </button>
            </form>
        </div>

        <p class="text-center text-[9px] mt-10 font-black italic opacity-30 tracking-[0.4em]">SYSTEM DEVELOPED BY: FIRDAUS SETITIT, S.Kom</p>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const cfg = {
            apiKey: "AIzaSyA3hAV-t9EYHBXpiUW9crY1q-tgM48wdRc",
            authDomain: "siapp-mas-malra-aa6c4.firebaseapp.com",
            projectId: "siapp-mas-malra-aa6c4",
            storageBucket: "siapp-mas-malra-aa6c4.firebasestorage.app",
            messagingSenderId: "18948056709",
            appId: "1:18948056709:web:6c5877826c206ac2e6ebec"
        };
        const app = initializeApp(cfg); const db = getFirestore(app);

        const v = document.getElementById('video-preview'); const cv = document.getElementById('face-canvas');
        const fR = document.getElementById('face-result'); const sub = document.getElementById('btnSubmit');
        const bB = document.getElementById('badgeBright'); let fBase = null; let kBase = null;
        let qStatus = { face: false, ktp: false };

        function updateLock() {
            if (qStatus.face && qStatus.ktp) {
                sub.disabled = false; sub.classList.remove('opacity-50', 'cursor-not-allowed');
                sub.innerText = "SISTEM TER-VALIDASI: KIRIM ADUAN SEKARANG";
                sub.className += " animate-pulse bg-emerald-600 shadow-emerald-500/20";
            } else {
                sub.disabled = true; sub.classList.add('opacity-50', 'cursor-not-allowed');
                sub.innerText = "DITOLAK: FOTO WAJAH & KTP TIDAK JELAS!";
            }
        }

        // ALGORITMA SENSOR PIKSEL TEGAS
        function sensorAudit(canvas, mode) {
            const ctx = canvas.getContext('2d');
            const pix = ctx.getImageData(0,0,canvas.width,canvas.height).data;
            let avg = 0; for(let i=0; i<pix.length; i+=4) avg += (pix[i]+pix[i+1]+pix[i+2])/3;
            avg = avg/(pix.length/4);
            const clear = avg > 55; // AMBANG CAHAYA TEGAS AUDITOR

            if(mode === 'WAJAH') {
                document.getElementById('qualityInfo').classList.remove('hidden');
                bB.className = clear ? "quality-badge status-pass" : "quality-badge status-fail";
                bB.innerText = clear ? "Wajah Jelas" : "Pencahayaan Buruk!";
                qStatus.face = clear;
            } else {
                const kBad = document.getElementById('ktpQuality');
                kBad.classList.remove('hidden');
                kBad.className = clear ? "quality-badge status-pass" : "quality-badge status-fail";
                kBad.innerText = clear ? "KTP TERDETEKSI : BERHASIL" : "KTP TERDETEKSI : BURAM / GELAP";
                qStatus.ktp = clear;
            }
            updateLock();
        }

        document.getElementById('start-camera').onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({video:true});
            v.srcObject = stream; v.style.display="block";
            document.getElementById('start-camera').style.display="none";
            document.getElementById('take-photo').style.display="block";
        };

        document.getElementById('take-photo').onclick = () => {
            cv.width = v.videoWidth; cv.height = v.videoHeight;
            cv.getContext('2d').drawImage(v,0,0);
            fBase = cv.toDataURL('image/jpeg');
            sensorAudit(cv, 'WAJAH');
            if(qStatus.face) { fR.src = fBase; fR.classList.remove('hidden'); v.style.display="none"; }
            else { alert("AUDIT WARNING: Foto wajah terlalu gelap/kabur. Tombol pengiriman tidak akan terbuka!"); }
        };

        document.getElementById('ktp_file').onchange = (e) => {
            const f = e.target.files[0];
            const rd = new FileReader();
            rd.onload = (ev) => {
                kBase = ev.target.result;
                const iTemp = new Image();
                iTemp.onload = () => {
                    const cT = document.createElement('canvas'); cT.width = iTemp.width; cT.height = iTemp.height;
                    cT.getContext('2d').drawImage(iTemp,0,0);
                    sensorAudit(cT, 'KTP');
                    if(qStatus.ktp) { document.getElementById('ktpPreview').src=kBase; document.getElementById('ktpPreview').classList.remove('hidden'); }
                }; iTemp.src = kBase;
            }; rd.readAsDataURL(f);
        };

        document.getElementById('complaintForm').onsubmit = async (e) => {
            e.preventDefault(); const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "AUDIT SERVER : ENKRIPSI IDENTITAS...";
            try {
                await addDoc(collection(db, "pengaduan"), {
                    ticket_id: "MALRA-ULTRA-" + Math.floor(1000 + Math.random() * 8999),
                    validasi_wajah: fBase, data_ktp: kBase,
                    no_hp: document.getElementById('no_hp').value,
                    kategori: document.getElementById('kategori').value,
                    kecamatan: document.getElementById('kecamatan').value,
                    desa: document.getElementById('desa').value,
                    perihal: document.getElementById('judul').value,
                    laporan_detail: document.getElementById('deskripsi').value,
                    status: "ANTREAN DINAS", timestamp: serverTimestamp()
                });
                alert("LAPORAN DITERIMA! DATA TELAH DIENKRIPSI SECARA AMAN.");
                window.location.reload();
            } catch(ex) { btn.disabled = false; }
        };
    </script>
</body>
</html>
