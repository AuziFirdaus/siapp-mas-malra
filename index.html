<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiAPP Mas | Modern Audit System Malra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .form-focus:focus { border-color: #3b82f6; ring: 4px; ring-color: rgba(37, 99, 235, 0.2); outline: none; }
        #video-preview { transform: scaleX(-1); border-radius: 20px; width: 100%; max-width: 280px; margin: 0 auto; display: none; background: #000; border: 4px solid #1e293b; }
        #face-canvas { display: none; }
        .quality-badge { font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 99px; text-transform: uppercase; letter-spacing: 1px; }
        .status-fail { background: #ef4444; color: white; }
        .status-pass { background: #10b981; color: white; }
        .alert-strict { background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%); border-left: 5px solid #3b82f6; }
    </style>
</head>
<body class="min-h-screen italic font-black uppercase tracking-tight">

    <!-- NAVBAR UPDATE: NAMA INSTANSI DI BAWAH LOGO -->
    <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 py-6 shadow-2xl px-6">
        <div class="max-w-xl mx-auto flex flex-col items-center text-center">
            <div class="flex items-center gap-3 mb-2">
                <div class="bg-blue-600 p-2 rounded-xl text-white shadow-xl animate-pulse"><i class="fas fa-shield-halved text-2xl"></i></div>
                <h1 class="text-3xl font-black italic tracking-tighter">SiAPP <span class="text-blue-500 underline decoration-white decoration-4">MAS</span></h1>
            </div>
            <h2 class="text-[12px] font-black text-slate-400 tracking-[0.25em] uppercase border-t border-slate-800 pt-2 px-4 italic">
                INSPEKTORAT KABUPATEN MALUKU TENGGARA
            </h2>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-8">
        <!-- KEBIJAKAN KERAHASIAAN -->
        <div class="alert-strict p-6 rounded-3xl mb-8 shadow-xl border border-slate-800">
            <div class="flex items-center gap-4">
                <i class="fas fa-user-lock text-blue-500 text-3xl"></i>
                <div>
                    <h3 class="text-[10px] text-blue-400 mb-1">AUDIT PRIVACY PROTECTION</h3>
                    <p class="text-[11px] text-white italic leading-tight underline uppercase">IDENTITAS PELAPOR DIJAMIN KERAHASIAANNYA OLEH INSTANSI SESUAI ATURAN PERUNDANG-UNDANGAN.</p>
                </div>
            </div>
        </div>

        <div class="bg-slate-900/50 rounded-[2.5rem] shadow-2xl border border-slate-800 p-8 md:p-10">
            <form id="complaintForm" class="space-y-6">
                
                <!-- SENSOR BIOMETRIK (FITUR PERMANEN) -->
                <div class="bg-slate-950 p-6 rounded-3xl border-2 border-dashed border-slate-800 text-center relative overflow-hidden">
                    <span class="inline-block text-[9px] text-blue-500 mb-4 tracking-[0.2em] font-black italic uppercase">Scan Wajah Biometrik Auditor</span>
                    <video id="video-preview" autoplay playsinline class="shadow-2xl mb-4 mx-auto"></video>
                    <canvas id="face-canvas"></canvas>
                    <img id="face-result" class="mx-auto rounded-3xl shadow-2xl mb-4 hidden border-4 border-slate-800" style="max-width: 220px;">
                    
                    <div id="qualityInfo" class="mb-4 flex justify-center gap-2 hidden font-sans">
                         <span id="badgeBright" class="quality-badge status-fail italic">Sensor Cahaya</span>
                         <span id="badgeSharp" class="quality-badge status-pass italic">Focus Locked</span>
                    </div>

                    <button type="button" id="start-camera" class="w-full bg-slate-800 p-4 rounded-2xl text-[10px] font-black uppercase shadow-lg active:scale-95 transition-all italic underline">1. Aktifkan Kamera Verifikasi</button>
                    <button type="button" id="take-photo" class="w-full bg-blue-600 p-4 rounded-2xl text-[10px] font-black hidden animate-pulse shadow-blue-500/20 italic tracking-widest decoration-white underline">2. Ambil Foto Wajah Jelas</button>
                </div>

                <!-- KOLOM BARU: NAMA SESUAI KTP -->
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 px-2 italic underline decoration-blue-500 decoration-2">Nama Pelapor Sesuai KTP</label>
                    <input type="text" id="nama_ktp" required placeholder="INPUT NAMA LENGKAP ANDA..." class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 font-black text-blue-400 form-focus uppercase italic text-xs tracking-widest decoration-white">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 underline underline-offset-2">
                    <div>
                        <label class="text-[9px] text-slate-500 px-2 italic">WhatsApp Aktif</label>
                        <input type="number" id="no_hp" required placeholder="08..." class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 font-bold text-slate-200 form-focus text-xs font-black">
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-500 px-2 italic uppercase">Jenis Laporan</label>
                        <select id="kategori" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 font-bold text-slate-200 form-focus uppercase text-xs font-black decoration-blue-500 underline decoration-2">
                            <option value="Korupsi">🚫 DUGAAN KORUPSI</option>
                            <option value="Pungli">💸 PUNGUTAN LIAR</option>
                            <option value="Pungli">💸 GRATIFIKASI</option>
                            <option value="Layanan Publik">🏢 LAYANAN BURUK</option>
                        </select>
                    </div>
                </div>

                <!-- SENSOR KTP (FITUR PERMANEN) -->
                <div class="bg-blue-600/5 p-6 rounded-[2.5rem] border border-blue-600/20 text-center italic border-dashed">
                    <label class="block text-[9px] text-blue-400 mb-4 tracking-widest font-black uppercase underline italic decoration-white"><i class="fas fa-id-card mr-2"></i> Foto Fisik KTP (Cahaya Terang)</label>
                    <img id="ktpPreview" class="rounded-xl w-full hidden border-2 border-slate-700 shadow-2xl mb-4 grayscale">
                    <input type="file" id="ktp_file" accept="image/*" required class="w-full text-[10px] text-slate-500 file:mr-4 file:py-2 file:px-6 file:rounded-2xl file:border-0 file:text-[9px] file:font-black file:bg-blue-600 file:text-white transition-all active:scale-95">
                    <p id="ktpQuality" class="quality-badge status-fail hidden mt-4 font-sans tracking-widest uppercase">E-KTP QUALITY: POOR</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 uppercase font-black underline italic">
                    <div>
                        <select id="kecamatan" required class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-[10px] text-white form-focus">
                            <option value="">- KECAMATAN -</option>
                            <option value="Kei Kecil">Kei Kecil</option><option value="Manyeuw">Manyeuw</option><option value="Kei Kecil Timur">Kei Kecil Timur</option>
                            <option value="Kei Kecil Timur Selatan">Kei Kecil Timur Selatan</option><option value="Kei Kecil Barat">Kei Kecil Barat</option>
                            <option value="Hoat Sorbay">Hoat Sorbay</option><option value="Kei Besar">Kei Besar</option>
                            <option value="Kei Besar Selatan">KEI BESAR SELATAN</option><option value="Kei Besar Selatan Barat">KEI BESAR SELATAN BARAT</option>
                            <option value="Kei Besar Utara Barat">KEI BESAR UTARA BARAT</option><option value="Kei Besar Utara Timur">KEI BESAR UTARA TIMUR</option>
                        </select>
                    </div>
                    <input type="text" id="desa" required placeholder="OHOI / DESA" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-xs font-black">
                </div>

                <div class="space-y-4">
                    <input type="text" id="judul" required placeholder="JUDUL PENGADUAN..." class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-5 font-black text-blue-500 underline text-xs">
                    <textarea id="deskripsi" rows="4" required placeholder="URAIKAN KEJADIAN SECARA TEGAS DAN JELAS..." class="w-full bg-slate-950 border border-slate-800 rounded-[2rem] p-6 text-sm font-medium tracking-tight text-white leading-relaxed decoration-blue-600 underline"></textarea>
                </div>

                <!-- TOMBOL TEGAS AUTO LOCK -->
                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 p-6 rounded-[2rem] font-black italic tracking-widest shadow-2xl opacity-40 cursor-not-allowed transition-all text-[11px] underline uppercase" disabled>
                    SISTEM MENUNGGU VALIDASI DATA KUALITAS AI
                </button>
            </form>
        </div>

        <p class="text-center text-[9px] mt-12 font-black italic opacity-30 tracking-[0.4em]">Integritas Auditor: Firdaus Setitit, S.Kom @ 2024</p>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const cfg = {
            apiKey: "AIzaSyA3hAV-t9EYHBXpiUW9crY1q-tgM48wdRc",
            authDomain: "siapp-mas-malra-aa6c4.firebaseapp.com",
            projectId: "siapp-mas-malra-aa6c4",
            storageBucket: "siapp-mas-malra-aa6c4.firebasestorage.app",
            messagingSenderId: "18948056709",
            appId: "1:18948056709:web:6c5877826c206ac2e6ebec"
        };
        const app = initializeApp(cfg); const db = getFirestore(app);

        const v = document.getElementById('video-preview'); const cv = document.getElementById('face-canvas');
        const fR = document.getElementById('face-result'); const sub = document.getElementById('btnSubmit');
        const bB = document.getElementById('badgeBright'); let fBase = null; let kBase = null;
        let qStatus = { face: false, ktp: false };

        function updateLock() {
            if (qStatus.face && qStatus.ktp) {
                sub.disabled = false; sub.classList.remove('opacity-40', 'cursor-not-allowed');
                sub.innerText = "DATA VALID : KIRIM ADUAN SEKARANG";
                sub.className += " bg-emerald-600 animate-pulse decoration-white";
            } else {
                sub.disabled = true; sub.classList.add('opacity-40', 'cursor-not-allowed');
                sub.innerText = "SENSOR DITOLAK: FOTO WAJAH & KTP BELUM JELAS!";
            }
        }

        // ALGORITMA PIKSEL SUPER POWER
        function sensorAudit(canvas, mode) {
            const ctx = canvas.getContext('2d');
            const pix = ctx.getImageData(0,0,canvas.width,canvas.height).data;
            let avg = 0; for(let i=0; i<pix.length; i+=4) avg += (pix[i]+pix[i+1]+pix[i+2])/3;
            avg = avg/(pix.length/4);
            const clear = avg > 58; // SENSOR AMBANG CAHAYA AUDITOR KETAT

            if(mode === 'WAJAH') {
                document.getElementById('qualityInfo').classList.remove('hidden');
                bB.className = clear ? "quality-badge status-pass" : "quality-badge status-fail";
                bB.innerText = clear ? "Pencahayaan Ok" : "Kamera Terlalu Gelap!";
                qStatus.face = clear;
            } else {
                const kBad = document.getElementById('ktpQuality');
                kBad.classList.remove('hidden');
                kBad.className = clear ? "quality-badge status-pass" : "quality-badge status-fail";
                kBad.innerText = clear ? "E-KTP TERVERIFIKASI" : "FOTO KTP TIDAK JELAS!";
                qStatus.ktp = clear;
            }
            updateLock();
        }

        document.getElementById('start-camera').onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({video:true});
            v.srcObject = stream; v.style.display="block";
            document.getElementById('start-camera').style.display="none";
            document.getElementById('take-photo').style.display="block";
        };

        document.getElementById('take-photo').onclick = () => {
            cv.width = v.videoWidth; cv.height = v.videoHeight;
            cv.getContext('2d').drawImage(v,0,0);
            fBase = cv.toDataURL('image/jpeg');
            sensorAudit(cv, 'WAJAH');
            if(qStatus.face) { fR.src = fBase; fR.classList.remove('hidden'); v.style.display="none"; }
            else { alert("ERROR AI: Pencahayaan kurang! Silakan cari tempat terang."); }
        };

        document.getElementById('ktp_file').onchange = (e) => {
            const f = e.target.files[0];
            const rd = new FileReader();
            rd.onload = (ev) => {
                kBase = ev.target.result;
                const iT = new Image();
                iT.onload = () => {
                    const cX = document.createElement('canvas'); cX.width = iT.width; cX.height = iT.height;
                    cX.getContext('2d').drawImage(iT,0,0);
                    sensorAudit(cX, 'KTP');
                    if(qStatus.ktp) { document.getElementById('ktpPreview').src=kBase; document.getElementById('ktpPreview').classList.remove('hidden'); }
                }; iT.src = kBase;
            }; rd.readAsDataURL(f);
        };

        document.getElementById('complaintForm').onsubmit = async (e) => {
            e.preventDefault(); const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "EXECUTING ENCRYPTION...";
            try {
                await addDoc(collection(db, "pengaduan"), {
                    ticket_id: "MALRA-GOV-" + Math.floor(1000 + Math.random() * 8999),
                    pelapor_ktp: document.getElementById('nama_ktp').value,
                    validasi_wajah: fBase, data_ktp: kBase,
                    no_hp: document.getElementById('no_hp').value,
                    kategori: document.getElementById('kategori').value,
                    kecamatan: document.getElementById('kecamatan').value,
                    desa: document.getElementById('desa').value,
                    perihal: document.getElementById('judul').value,
                    laporan_detail: document.getElementById('deskripsi').value,
                    status: "ANTREAN DINAS", timestamp: serverTimestamp()
                });
                alert("SUKSES! DATA BERHASIL DIARSIPKAN SECARA VALID KE SISTEM AUDITOR.");
                window.location.reload();
            } catch(ex) { btn.disabled = false; }
        };
    </script>
</body>
</html>
