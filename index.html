<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiAPP Mas | Malra Modern Integrity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .form-focus:focus { transform: translateY(-2px); border-color: #2563eb; ring: 4px; ring-color: rgba(37, 99, 235, 0.1); }
        #video-preview { transform: scaleX(-1); border-radius: 20px; width: 100%; max-width: 280px; margin: 0 auto; display: none; background: #000; }
        #face-canvas { display: none; }
        .alert-shield { background: linear-gradient(90deg, #eff6ff 0%, #ffffff 100%); border-left: 4px solid #2563eb; }
        .img-preview { width: 100%; max-height: 200px; object-fit: contain; border-radius: 1rem; border: 2px dashed #cbd5e1; padding: 5px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- NAVBAR RESMI -->
    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 py-4 shadow-sm">
        <div class="max-w-xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2.5 rounded-xl text-white shadow-lg"><i class="fas fa-fingerprint"></i></div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 leading-none">SiAPP <span class="text-blue-600">Mas</span></h1>
                    <p class="text-[9px] font-black text-slate-400 tracking-[0.2em] mt-1 italic uppercase px-0.5">INSPEKTORAT KABUPATEN MALUKU TENGGARA</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-8">
        <!-- JAMINAN KERAHASIAAN PELAPOR -->
        <div class="alert-shield rounded-2xl p-5 mb-6 shadow-sm flex items-center gap-4 border border-blue-100">
            <div class="bg-blue-600 text-white p-3 rounded-full shadow-md animate-pulse">
                <i class="fas fa-user-shield text-lg"></i>
            </div>
            <div>
                <h4 class="text-[10px] font-black text-blue-900 uppercase tracking-tight">Pernyataan Kerahasiaan Identitas</h4>
                <p class="text-[11px] font-bold text-blue-700 italic leading-relaxed mt-0.5">
                    "Sistem SiAPP Mas Menjamin Identitas Pelapor Dirahasiakan Oleh Instansi Berdasarkan Peraturan Perundang-undangan."
                </p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-slate-100 p-7 md:p-10">
            <form id="complaintForm" class="space-y-6 uppercase italic font-black">
                
                <!-- SCAN WAJAH (BIOMETRIK) -->
                <div class="bg-slate-50 rounded-3xl p-6 border-2 border-dashed border-slate-200 text-center">
                    <span class="inline-block bg-slate-200 text-slate-700 text-[9px] font-black px-4 py-1 rounded-full mb-4 uppercase">Verification : Biometric Mode</span>
                    <video id="video-preview" autoplay playsinline class="shadow-2xl mb-4 mx-auto border-4 border-white"></video>
                    <canvas id="face-canvas"></canvas>
                    <img id="face-result" class="mx-auto rounded-3xl shadow-2xl mb-4 hidden border-4 border-white" style="max-width: 220px;">
                    <button type="button" id="start-camera" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-camera"></i> Mulai Scan Wajah
                    </button>
                    <button type="button" id="take-photo" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-black text-[10px] hidden items-center justify-center gap-2 animate-bounce">
                        <i class="fas fa-face-smile"></i> Ambil Scan Verifikasi
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <!-- NOMOR TELEPON -->
                    <div class="space-y-1">
                        <label class="text-[10px] text-slate-500 uppercase tracking-widest px-1 leading-loose">No HP / WhatsApp Aktif</label>
                        <input type="number" id="no_hp" placeholder="Contoh: 08..." required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none transition-all font-bold text-slate-700 form-focus">
                    </div>
                    <!-- KATEGORI ADUAN -->
                    <div class="space-y-1">
                        <label class="text-[10px] text-slate-500 uppercase tracking-widest px-1 leading-loose">Kategori Masalah</label>
                        <select id="kategori" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none font-bold text-slate-700">
                            <option value="Korupsi">Dugaan Korupsi</option>
                            <option value="Pungli">Pungutan Liar (Pungli)</option>
                            <option value="Layanan Publik">Layanan Publik Buruk</option>
                        </select>
                    </div>
                </div>

                <!-- FITUR BARU: UPLOAD KTP (INTEGRITAS PELAPOR) -->
                <div class="bg-blue-50/50 p-6 rounded-[2rem] border-2 border-blue-100 flex flex-col items-center">
                    <label class="block text-[10px] text-blue-800 uppercase font-black tracking-widest mb-4"><i class="fas fa-id-card mr-2"></i> Upload Foto KTP (Maks. 3MB)</label>
                    <img id="ktpPreview" src="" class="img-preview mb-4 hidden">
                    <input type="file" id="ktp_file" accept="image/*" required class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-6 file:rounded-2xl file:border-0 file:text-[10px] file:font-black file:bg-blue-600 file:text-white hover:file:bg-blue-700 transition-all cursor-pointer">
                    <p id="ktpError" class="text-red-500 text-[10px] mt-2 hidden italic uppercase underline decoration-2 font-sans font-black">* UKURAN KTP MELEBIHI 3MB!</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <!-- KECAMATAN -->
                    <div class="space-y-1">
                        <label class="text-[10px] text-slate-500 uppercase tracking-widest px-1 leading-loose font-sans font-black italic">Lokasi Kecamatan</label>
                        <select id="kecamatan" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none font-bold text-slate-700 font-sans italic text-wrap text-justify">
                            <option value="">- Pilih Kecamatan -</option>
                            <option value="Kei Kecil">Kei Kecil</option>
                            <option value="Manyeuw">Manyeuw</option>
                            <option value="Kei Kecil Timur">Kei Kecil Timur</option>
                            <option value="Kei Kecil Timur Selatan">Kei Kecil Timur Selatan</option>
                            <option value="Kei Kecil Barat">Kei Kecil Barat</option>
                            <option value="Hoat Sorbay">Hoat Sorbay</option>
                            <option value="Kei Besar">Kei Besar</option>
                            <option value="Kei Besar Selatan">Kei Besar Selatan</option>
                            <option value="Kei Besar Selatan Barat">Kei Besar Selatan Barat</option>
                            <option value="Kei Besar Utara Barat">Kei Besar Utara Barat</option>
                            <option value="Kei Besar Utara Timur">Kei Besar Utara Timur</option>
                        </select>
                    </div>
                    <!-- DESA / OHOI -->
                    <div class="space-y-1">
                        <label class="text-[10px] text-slate-500 uppercase tracking-widest px-1 leading-loose">Desa / Ohoi</label>
                        <input type="text" id="desa" placeholder="Tulis Ohoi..." required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none font-bold text-slate-700 form-focus uppercase tracking-widest italic text-xs font-sans">
                    </div>
                </div>

                <!-- JUDUL & DESKRIPSI -->
                <div class="space-y-4">
                    <input type="text" id="judul" placeholder="PERIHAL LAPORAN" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-5 font-black text-slate-900 form-focus">
                    <textarea id="deskripsi" rows="5" placeholder="URAIKAN KEJADIAN SECARA RINCI..." required class="w-full bg-slate-50 border border-slate-200 rounded-[2rem] px-5 py-5 font-medium text-slate-600 form-focus text-sm leading-relaxed"></textarea>
                </div>

                <!-- UNGGAH BUKTI PENDUKUNG -->
                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-200 italic underline">
                    <label class="block text-[10px] text-slate-500 mb-2 uppercase">Unggah Dokumen/Bukti Pendukung (Maks 3MB)</label>
                    <input type="file" id="bukti" accept="image/*, application/pdf" class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-[9px] file:font-black file:bg-slate-900 file:text-white">
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-[2rem] shadow-2xl transition-all active:scale-95 text-xs tracking-widest italic decoration-blue-800 underline decoration-4 uppercase flex items-center justify-center gap-3">
                    SUBMIT LAPORAN SECARA AMAN <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>

        <p class="text-center text-[10px] text-slate-400 mt-10 font-bold uppercase tracking-[0.4em] opacity-40">System Architect: Firdaus Setitit, S.Kom</p>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyA3hAV-t9EYHBXpiUW9crY1q-tgM48wdRc",
            authDomain: "siapp-mas-malra-aa6c4.firebaseapp.com",
            projectId: "siapp-mas-malra-aa6c4",
            storageBucket: "siapp-mas-malra-aa6c4.firebasestorage.app",
            messagingSenderId: "18948056709",
            appId: "1:18948056709:web:6c5877826c206ac2e6ebec"
        };

        const app = initializeApp(config);
        const db = getFirestore(app);

        // --- SISTEM PREVIEW KTP & VALIDASI SIZE ---
        const ktpInput = document.getElementById('ktp_file');
        const ktpPreview = document.getElementById('ktpPreview');
        const ktpError = document.getElementById('ktpError');
        let ktpBase64 = null;

        ktpInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file.size > 3 * 1024 * 1024) {
                ktpError.classList.remove('hidden');
                ktpInput.value = "";
                ktpPreview.classList.add('hidden');
                return;
            }
            ktpError.classList.add('hidden');
            const reader = new FileReader();
            reader.onloadend = () => {
                ktpBase64 = reader.result;
                ktpPreview.src = ktpBase64;
                ktpPreview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        // --- SISTEM BIOMETRIK SCAN ---
        const startCam = document.getElementById('start-camera');
        const takePhoto = document.getElementById('take-photo');
        const video = document.getElementById('video-preview');
        const canvas = document.getElementById('face-canvas');
        const faceResult = document.getElementById('face-result');
        let faceBase64 = null;

        startCam.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.style.display = "block";
            startCam.style.display = "none";
            takePhoto.style.display = "flex";
        };

        takePhoto.onclick = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            faceBase64 = canvas.toDataURL('image/jpeg');
            faceResult.src = faceBase64;
            faceResult.classList.remove('hidden');
            video.style.display = "none";
            takePhoto.innerText = "Ulangi Scan Wajah";
            video.srcObject.getTracks().forEach(t => t.stop());
        };

        // --- PROSES SUBMIT ---
        document.getElementById('complaintForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!faceBase64) return alert("Peringatan Auditor: Scan Wajah Wajib Dilakukan!");
            if(!ktpBase64) return alert("Peringatan Auditor: Foto KTP Wajib Diunggah!");
            
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-shield fa-spin'></i> DATA SEDANG DIENKRIPSI...";

            try {
                await addDoc(collection(db, "pengaduan"), {
                    ticket_id: "MALRA-" + Math.floor(Math.random() * 9999),
                    validasi_wajah: faceBase64,
                    data_ktp: ktpBase64,
                    no_hp: document.getElementById('no_hp').value,
                    kategori: document.getElementById('kategori').value,
                    kecamatan: document.getElementById('kecamatan').value,
                    desa: document.getElementById('desa').value,
                    perihal: document.getElementById('judul').value,
                    laporan_detail: document.getElementById('deskripsi').value,
                    status: "ANTREAN VERIFIKASI",
                    timestamp: serverTimestamp()
                });
                alert("Sukses! Laporan telah diterima secara sah oleh Sistem SiAPP Mas.");
                window.location.reload();
            } catch (err) {
                alert("ERR-FIREBASE: " + err.message);
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
